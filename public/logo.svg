<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .navy { fill: #1e4a8c; }
      .orange { fill: #f7941d; }
    </style>
  </defs>

  <!-- House roof + walls, single-stroke outline -->
  <g fill="none" stroke="#1e4a8c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M42 90 L100 42 L158 90"/>
    <path d="M64 76 L64 110"/>
    <path d="M136 76 L136 110"/>
  </g>

  <!-- Trowel (colher de pedreiro) -->
  <g transform="translate(100,108) rotate(-40)">
    <path class="orange" d="M-6 -34 L6 -34 L10 4 L-10 4 Z"/>
    <rect class="orange" x="-4" y="4" width="8" height="22" rx="2"/>
    <rect class="navy" x="-9" y="24" width="18" height="8" rx="3"/>
  </g>

  <!-- Bricks row -->
  <g class="orange">
    <rect x="58" y="118" width="26" height="14" rx="1.5"/>
    <rect x="87" y="118" width="26" height="14" rx="1.5"/>
    <rect x="116" y="118" width="26" height="14" rx="1.5"/>
    <rect x="71" y="134" width="26" height="14" rx="1.5"/>
    <rect x="100" y="134" width="26" height="14" rx="1.5"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="21" fill="#1e4a8c" letter-spacing="0.5">FERRAGENS</text>
  <text x="100" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="21" fill="#1e4a8c" letter-spacing="0.5">DO ELSON</text>
</svg>
